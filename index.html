<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Plataforma de entrenamiento en ciberseguridad para empleados. Aprende a detectar phishing, URLs maliciosas y ataques de ingeniería social.">
    <title>CyberShield — Entrenamiento Anti-Phishing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- Header -->
    <header class="header" id="mainHeader">
        <div class="header-content">
            <div class="logo" id="logoHome">
                <div class="logo-icon">
                    <svg viewBox="0 0 40 40" fill="none">
                        <path d="M20 2L4 10V20C4 30 12 38 20 38C28 38 36 30 36 20V10L20 2Z" stroke="url(#shieldGrad)"
                            stroke-width="2.5" fill="none" />
                        <path d="M14 20L18 24L26 16" stroke="url(#checkGrad)" stroke-width="2.5" stroke-linecap="round"
                            stroke-linejoin="round" />
                        <defs>
                            <linearGradient id="shieldGrad" x1="4" y1="2" x2="36" y2="38">
                                <stop stop-color="#00f5d4" />
                                <stop offset="1" stop-color="#7b61ff" />
                            </linearGradient>
                            <linearGradient id="checkGrad" x1="14" y1="16" x2="26" y2="24">
                                <stop stop-color="#00f5d4" />
                                <stop offset="1" stop-color="#00bbf9" />
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <span class="logo-text">CyberShield</span>
            </div>
            <nav class="nav-info">
                <div class="progress-badge" id="globalProgress">
                    <span class="progress-icon">🏆</span>
                    <span class="progress-text">0 / 7 completadas</span>
                </div>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Dashboard View -->
        <section class="dashboard" id="dashboard">
            <div class="hero">
                <h1 class="hero-title">
                    Entrenamiento de
                    <span class="gradient-text">Ciberseguridad</span>
                </h1>
                <p class="hero-subtitle">
                    Aprende a identificar amenazas de phishing, correos fraudulentos y sitios web maliciosos.
                    Completa las 7 actividades para obtener tu certificación.
                </p>
            </div>

            <div class="activities-grid" id="activitiesGrid">
                <!-- Cards rendered by JS -->
            </div>
        </section>

        <!-- Activity View -->
        <section class="activity-view hidden" id="activityView">
            <div class="activity-header">
                <button class="btn-back" id="btnBack">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M19 12H5M12 19l-7-7 7-7" />
                    </svg>
                    Volver al panel
                </button>
                <div class="activity-meta">
                    <span class="activity-badge" id="activityBadge"></span>
                    <h2 class="activity-title" id="activityTitle"></h2>
                    <p class="activity-desc" id="activityDesc"></p>
                </div>
            </div>
            <div class="activity-body" id="activityBody">
                <!-- Dynamic content -->
            </div>
        </section>

        <!-- Results View -->
        <section class="results-view hidden" id="resultsView">
            <div class="results-card">
                <div class="results-icon" id="resultsIcon"></div>
                <h2 class="results-title" id="resultsTitle"></h2>
                <p class="results-score" id="resultsScore"></p>
                <p class="results-message" id="resultsMessage"></p>
                <div class="results-actions">
                    <button class="btn btn-primary" id="btnRetry">Reintentar</button>
                    <button class="btn btn-secondary" id="btnDashboard">Volver al panel</button>
                </div>
            </div>
        </section>
    </main>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
    <script src="app.js"></script>
</body>

</html>
